version: '3.8'

services:
  web:
    build: .
    container_name: upi-fraud-analyzer
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./instance:/app/instance
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=production
      - SECRET_KEY=change-this-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  data:
  models:
  reports:
  instance:
