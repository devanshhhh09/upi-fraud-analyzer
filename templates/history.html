{% extends "base.html" %}
{% block title %}Scan History{% endblock %}

{% block content %}
<h4 class="fw-bold mb-1">Scan History</h4>
<p class="text-muted mb-4">All previous complaint scans and URL analyses.</p>

<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold mb-0">Recent Scans</h6>
        <input type="text" class="form-control form-control-sm w-auto"
               id="history-filter" placeholder="Filter by type..."
               oninput="filterHistory(this.value)">
    </div>

    <div id="history-list">
        <div class="text-center text-muted py-5">
            <i class="bi bi-clock-history" style="font-size:48px;opacity:0.3"></i>
            <p class="mt-3">No scans yet. Go to the scanner to analyze complaints.</p>
            <a href="/scanner" class="btn btn-primary btn-sm">Start Scanning</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allScans = [];

async function loadHistory() {
    try {
        const res  = await fetch('/api/history');
        const data = await res.json();
        allScans   = data.scans || [];
        renderHistory(allScans);
    } catch(e) {
        console.log('History not available yet');
    }
}

function renderHistory(scans) {
    const el = document.getElementById('history-list');
    if (!scans.length) return;
    el.innerHTML = scans.map(s => `
        <div class="border rounded p-3 mb-2 history-item" data-type="${s.prediction || ''}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span class="badge bg-primary me-2">${(s.prediction || 'unknown').replace(/_/g,' ')}</span>
                    <small class="text-muted">${s.timestamp?.substring(0,19).replace('T',' ')}</small>
                </div>
                <div class="text-end">
                    <small>Confidence: <strong>${s.confidence}%</strong></small><br>
                    <small>Risk: <strong>${s.risk_score}/100</strong></small>
                </div>
            </div>
            <small class="text-muted mt-1 d-block">${(s.input_text || '').substring(0,120)}...</small>
        </div>
    `).join('');
}

function filterHistory(query) {
    const filtered = allScans.filter(s =>
        (s.prediction || '').includes(query.toLowerCase())
    );
    renderHistory(filtered);
}

loadHistory();
</script>
{% endblock %}
